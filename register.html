<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Apple Support</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 480px;
            margin: 80px auto;
            padding: 0 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .auth-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .auth-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        
        .form-group input.error {
            border-color: #ff3b30;
        }
        
        .error-message {
            color: #ff3b30;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .submit-btn:hover {
            background: #0077ed;
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #86868b;
        }
        
        .auth-footer a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join Apple Support for better service</p>
            </div>
            
            <div class="auth-body">
                <div class="success-message" id="successMessage">
                    Registration successful! Redirecting to login...
                </div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                        <span class="error-message"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error-message"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required maxlength="10" pattern="\d{10}" placeholder="Enter 10 digits only">
                        <span class="error-message"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" required>
                        <span class="error-message"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                        <span class="error-message"></span>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="terms" name="terms" required>
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                        <span class="error-message"></span>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span class="btn-text">Create Account</span>
                        <div class="loading-spinner"></div>
                    </button>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            const submitBtn = form.querySelector('.submit-btn');
            const btnText = submitBtn.querySelector('.btn-text');
            const loadingSpinner = submitBtn.querySelector('.loading-spinner');
            const successMessage = document.getElementById('successMessage');
            
            // Form validation rules
            const validators = {
                fullName: {
                    required: true,
                    minLength: 2,
                    pattern: /^[a-zA-Z\s]+$/,
                    message: 'Please enter a valid full name (letters only, minimum 2 characters)'
                },
                email: {
                    required: true,
                    pattern: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                    message: 'Please enter a valid email address'
                },
                phone: {
                    required: true,
                    pattern: /^\d{10}$/,
                    message: 'Please enter exactly 10 digits (no spaces, dashes, or special characters)'
                },
                password: {
                    required: true,
                    minLength: 8,
                    pattern: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/,
                    message: 'Password must be at least 8 characters with uppercase, lowercase, and number'
                },
                confirmPassword: {
                    required: true,
                    custom: (value) => {
                        const password = document.getElementById('password').value;
                        return value === password;
                    },
                    message: 'Passwords do not match'
                },
                terms: {
                    required: true,
                    custom: (value) => value.checked,
                    message: 'You must agree to the terms and conditions'
                }
            };
            
            // Real-time validation
            const inputs = form.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('blur', () => validateField(input));
                input.addEventListener('input', () => {
                    // Special handling for phone number - only allow digits
                    if (input.id === 'phone') {
                        input.value = input.value.replace(/\D/g, '').slice(0, 10);
                    }
                    if (input.classList.contains('error')) {
                        validateField(input);
                    }
                });
            });
            
            function validateField(field) {
                const name = field.name;
                const value = field.type === 'checkbox' ? field.checked : field.value.trim();
                const validator = validators[name];
                const errorElement = field.parentElement.querySelector('.error-message');
                
                if (!validator) return true;
                
                let isValid = true;
                
                if (validator.required && !value) {
                    isValid = false;
                } else if (validator.minLength && value.length < validator.minLength) {
                    isValid = false;
                } else if (validator.pattern && !validator.pattern.test(value)) {
                    isValid = false;
                } else if (validator.custom && !validator.custom(field)) {
                    isValid = false;
                }
                
                if (isValid) {
                    field.classList.remove('error');
                    errorElement.style.display = 'none';
                } else {
                    field.classList.add('error');
                    errorElement.textContent = validator.message;
                    errorElement.style.display = 'block';
                }
                
                return isValid;
            }
            
            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Validate all fields
                let isFormValid = true;
                inputs.forEach(input => {
                    if (!validateField(input)) {
                        isFormValid = false;
                    }
                });
                
                if (!isFormValid) {
                    return;
                }
                
                // Show loading state
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                loadingSpinner.style.display = 'block';
                
                try {
                    const formData = new FormData(form);
                    const data = {
                        fullName: formData.get('fullName'),
                        email: formData.get('email'),
                        phone: formData.get('phone'),
                        password: formData.get('password')
                    };
                    
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        successMessage.style.display = 'block';
                        form.reset();
                        
                        // Redirect to login after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        throw new Error(result.error || 'Registration failed');
                    }
                    
                } catch (error) {
                    alert('Registration failed: ' + error.message);
                } finally {
                    // Hide loading state
                    submitBtn.disabled = false;
                    btnText.style.display = 'block';
                    loadingSpinner.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
